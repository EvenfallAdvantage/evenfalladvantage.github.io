name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: overwatch-src/package-lock.json

      - name: Install Overwatch dependencies
        working-directory: overwatch-src
        run: npm ci

      - name: Build Overwatch (Next.js static export)
        working-directory: overwatch-src
        env:
          # Supabase public keys are safe to expose in CI (they are scoped/RLS-protected)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: https://www.evenfalladvantage.com
        run: npm run build

      - name: Copy Overwatch build output to /overwatch
        run: |
          rm -rf overwatch
          mkdir -p overwatch
          cp -r overwatch-src/out/. overwatch/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact (exclude source dirs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
