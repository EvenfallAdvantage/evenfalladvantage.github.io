name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: overwatch-src/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: overwatch-src/.next/cache
          key: nextjs-${{ hashFiles('overwatch-src/package-lock.json') }}-${{ hashFiles('overwatch-src/src/**') }}
          restore-keys: |
            nextjs-${{ hashFiles('overwatch-src/package-lock.json') }}-
            nextjs-

      - name: Install Overwatch dependencies
        working-directory: overwatch-src
        run: npm ci

      - name: Security audit (npm)
        working-directory: overwatch-src
        run: npm audit --audit-level=critical

      - name: Lint
        working-directory: overwatch-src
        run: npm run lint -- --max-warnings 0

      - name: Run tests
        working-directory: overwatch-src
        run: npm test

      - name: Build Overwatch (Next.js static export)
        working-directory: overwatch-src
        env:
          # Supabase public keys are safe to expose in CI (they are scoped/RLS-protected)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CESIUM_TOKEN: ${{ secrets.NEXT_PUBLIC_CESIUM_TOKEN }}
          NEXT_PUBLIC_SENTINEL_HUB_INSTANCE_ID: ${{ secrets.NEXT_PUBLIC_SENTINEL_HUB_INSTANCE_ID }}
          NEXT_PUBLIC_LEGACY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_LEGACY_SUPABASE_URL }}
          NEXT_PUBLIC_LEGACY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_LEGACY_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Inject build hash into service worker
        run: |
          BUILD_HASH="${GITHUB_SHA::8}"
          sed -i "s/__BUILD_HASH__/${BUILD_HASH}/g" overwatch-src/out/sw.js
          echo "Service worker CACHE_NAME set to overwatch-${BUILD_HASH}"

      - name: Copy Overwatch build output to /overwatch
        run: |
          rm -rf overwatch
          mkdir -p overwatch
          cp -r overwatch-src/out/. overwatch/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare deployment directory (public files only)
        run: |
          mkdir -p _deploy
          # Copy only public-facing content
          cp -r overwatch/ _deploy/overwatch/
          cp -r css/ _deploy/css/
          cp -r js/ _deploy/js/
          cp -r images/ _deploy/images/
          cp -r audio/ _deploy/audio/
          cp -r forms/ _deploy/forms/
          cp -r case-studies/ _deploy/case-studies/
          cp -r includes/ _deploy/includes/
          cp -r student-portal/ _deploy/student-portal/
          cp -r instructor-portal/ _deploy/instructor-portal/
          cp -r admin/ _deploy/admin/
          cp -r student-resources/ _deploy/student-resources/
          # Copy top-level HTML and config files
          cp index.html about.html blog.html login.html register.html dashboard.html _deploy/
          cp privacy-policy.html terms-of-service.html _deploy/
          cp google3c85dd61b89bb3b1.html _deploy/ 2>/dev/null || true
          cp CNAME .nojekyll _deploy/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_deploy'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
