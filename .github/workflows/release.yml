name: Release Companion App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: companion
        run: npm ci

      - name: Build companion app
        working-directory: companion
        run: |
          npm run build
          npm run build:sea

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: companion/dist/sdr-companion.exe
          name: Release ${{ github.ref_name }}
          body: |
            ### SDR Companion App
            Run this on Windows to enable SDR tuning from the browser.
            
            ## Requirements
            - Windows 10/11
            - RTL-SDR USB dongle
            - Chrome or Edge browser
            
            ## Usage
            1. Plug in your RTL-SDR dongle
            2. Run `sdr-companion.exe`
            3. Open https://evenfalladvantage.github.io/overwatch/
            4. Click "Connect SDR"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
