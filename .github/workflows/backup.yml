name: Daily Database Backup

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Export OverwatchDB
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --format=custom \
            --file="backups/overwatch-${DATE}.dump"
          echo "Backup created: overwatch-${DATE}.dump ($(du -h backups/overwatch-${DATE}.dump | cut -f1))"

      - name: Prune old backups (keep last 30)
        run: |
          cd backups
          ls -t *.dump 2>/dev/null | tail -n +31 | xargs -r rm
          echo "Backups retained: $(ls *.dump 2>/dev/null | wc -l)"

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "backup: daily database export $(date +%Y-%m-%d)"
          git push
