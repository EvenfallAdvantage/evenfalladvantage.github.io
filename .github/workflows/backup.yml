name: Daily Database Backup

# IMPORTANT: Backups are uploaded as workflow artifacts (retained 30 days).
# They are NOT committed to the repo (this is a public GitHub Pages repo).
# To download a backup: Actions tab -> Daily Database Backup -> select run -> download artifact.

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Export OverwatchDB
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups
          # Force IPv4 — GitHub Actions resolves Supabase to IPv6 which is unreachable
          # Extract hostname from DATABASE_URL, resolve to IPv4, replace in URL
          DB_HOST=$(echo "$DATABASE_URL" | sed -n 's|.*@\([^:/]*\).*|\1|p')
          DB_IPV4=$(getent ahostsv4 "$DB_HOST" | head -1 | awk '{print $1}')
          if [ -n "$DB_IPV4" ]; then
            BACKUP_URL=$(echo "$DATABASE_URL" | sed "s|$DB_HOST|$DB_IPV4|")
            echo "Resolved $DB_HOST -> $DB_IPV4 (forcing IPv4)"
          else
            BACKUP_URL="$DATABASE_URL"
            echo "Warning: Could not resolve IPv4, using original URL"
          fi
          pg_dump "$BACKUP_URL" \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --format=custom \
            --file="backups/overwatch-${DATE}.dump"
          echo "Backup created: overwatch-${DATE}.dump ($(du -h backups/overwatch-${DATE}.dump | cut -f1))"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/*.dump
          retention-days: 30
          if-no-files-found: error
