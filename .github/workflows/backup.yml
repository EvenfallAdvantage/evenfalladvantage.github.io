name: Daily Database Backup

# IMPORTANT: Backups are uploaded as workflow artifacts (retained 30 days).
# They are NOT committed to the repo (this is a public GitHub Pages repo).
# To download a backup: Actions tab -> Daily Database Backup -> select run -> download artifact.

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6:00 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Export OverwatchDB
        env:
          # IMPORTANT: Use the Supabase SESSION MODE (port 5432) pooler URL, NOT the
          # direct db.* URL. The direct URL resolves to IPv6 only, which GitHub Actions
          # runners cannot reach. The pooler URL resolves to IPv4.
          #
          # Format: postgresql://postgres.PROJECTREF:PASSWORD@aws-0-REGION.pooler.supabase.com:5432/postgres
          # Set this as SUPABASE_DB_URL in GitHub Actions secrets.
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --format=custom \
            --file="backups/overwatch-${DATE}.dump"
          echo "Backup created: overwatch-${DATE}.dump ($(du -h backups/overwatch-${DATE}.dump | cut -f1))"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v7  # TODO: upgrade to v5 when Node.js 24 is required (June 2026)
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/*.dump
          retention-days: 30
          if-no-files-found: error
