<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Overwatch | Evenfall Advantage</title>
    <meta http-equiv="refresh" content="3;url=../overwatch/login/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); font-family: system-ui, -apple-system, sans-serif; color: #e2e8f0; }
        .card { max-width: 420px; width: 90%; text-align: center; padding: 3rem 2rem; background: rgba(30,41,59,0.6); border: 1px solid rgba(245,158,11,0.2); border-radius: 1rem; backdrop-filter: blur(12px); }
        .badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); border-radius: 2rem; padding: 0.35rem 1rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; color: #fbbf24; margin-bottom: 1.5rem; text-transform: uppercase; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(245,158,11,0.2); border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { display: inline-block; padding: 0.65rem 2rem; background: #f59e0b; color: #0f172a; border-radius: 0.5rem; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.2s; }
        .btn:hover { background: #d97706; }
        .note { margin-top: 1.5rem; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">&#9889; Platform Upgrade</div>
        <h1>Instructor Portal has moved</h1>
        <p class="sub">Class scheduling, attendance, certificates, and student management are now in <strong>Overwatch Instructor HQ</strong>.</p>
        <div class="spinner"></div>
        <a href="../overwatch/login/" class="btn">Open Overwatch &rarr;</a>
        <p class="note">Redirecting automatically in 3 seconds&hellip;</p>
    </div>
    <script>setTimeout(function(){ window.location.href = "../overwatch/login/"; }, 3000);</script>
</body>
</html>
