<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline — Overwatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0b1422;color:#e8e9ec;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
  .card{max-width:380px}
  .icon{width:64px;height:64px;margin:0 auto 1.5rem;opacity:.5}
  h1{font-size:1.5rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem;font-family:ui-monospace,monospace}
  p{font-size:.875rem;color:#8a8f9c;line-height:1.5;margin-bottom:1.5rem}
  button{background:#dd8c33;color:#0b1422;border:none;padding:.625rem 1.5rem;border-radius:.375rem;font-size:.875rem;font-weight:600;cursor:pointer;transition:opacity .2s}
  button:hover{opacity:.85}
  .pulse{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}
</style>
</head>
<body>
<div class="card">
  <svg class="icon pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>
  <h1>Connection Lost</h1>
  <p>You appear to be offline. Overwatch requires an internet connection for real-time operations. Check your network and try again.</p>
  <button onclick="location.reload()">Retry Connection</button>
</div>
</body>
</html>
