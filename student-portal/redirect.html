<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Overwatch | Evenfall Advantage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 2rem;
        }
        .logo { width: 64px; height: 64px; border-radius: 12px; margin-bottom: 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; font-family: monospace; margin-bottom: 0.5rem; }
        p { color: rgba(255,255,255,0.5); font-size: 0.875rem; max-width: 400px; line-height: 1.6; margin-bottom: 1.5rem; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.75rem;
        }
        a:hover { text-decoration: underline; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 0.375rem 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
        }
    </style>
    <!-- Auto-redirect after 3 seconds -->
    <meta http-equiv="refresh" content="3;url=https://evenfalladvantage.github.io/overwatch-src/login">
</head>
<body>
    <div class="badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Platform Upgrade
    </div>
    <div class="spinner"></div>
    <h1>MIGRATING TO OVERWATCH</h1>
    <p>
        The Student Portal has been upgraded to <strong>Overwatch</strong> — our new unified
        workforce management platform. You will be redirected automatically.
    </p>
    <a href="/login">Click here if not redirected</a>
</body>
</html>
