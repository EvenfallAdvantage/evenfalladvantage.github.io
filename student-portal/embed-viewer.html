<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0e14;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        /* Loading */
        .loader { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 1rem; }
        .loader .spinner { width: 32px; height: 32px; border: 3px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: #64748b; font-size: 0.875rem; }

        /* Error */
        .error { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 0.5rem; color: #94a3b8; }

        /* Slide area */
        .slide-wrapper { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }
        .slide-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.75rem; color: #f1f5f9; }
        .slide-body { font-size: 0.875rem; line-height: 1.7; color: #cbd5e1; }
        .slide-body h2, .slide-body h3, .slide-body h4 { color: #f1f5f9; margin: 1rem 0 0.5rem; }
        .slide-body h2 { font-size: 1.125rem; }
        .slide-body h3 { font-size: 1rem; }
        .slide-body h4 { font-size: 0.875rem; }
        .slide-body p { margin-bottom: 0.75rem; }
        .slide-body ul, .slide-body ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .slide-body li { margin-bottom: 0.35rem; }
        .slide-body strong { color: #f1f5f9; }
        .slide-body a { color: #60a5fa; }
        .slide-body .slide-callout {
            background: #111827; border: 1px solid #1e293b; border-radius: 0.5rem;
            padding: 1rem; margin: 1rem 0;
        }
        .slide-body .slide-callout h4 { margin-top: 0; color: #60a5fa; }
        .slide-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.8125rem; }
        .slide-body th, .slide-body td { padding: 0.5rem 0.75rem; border: 1px solid #1e293b; text-align: left; }
        .slide-body th { background: #111827; color: #f1f5f9; font-weight: 600; }

        /* Quiz styles */
        .slide-quiz { margin: 1rem 0; }
        .slide-quiz-question { font-weight: 600; color: #f1f5f9; margin-bottom: 0.75rem; }
        .slide-quiz-options { display: flex; flex-direction: column; gap: 0.5rem; }
        .slide-quiz-option {
            padding: 0.75rem 1rem; border: 1px solid #1e293b; border-radius: 0.5rem;
            cursor: pointer; transition: all 0.15s; font-size: 0.875rem;
            background: #111827; color: #cbd5e1;
        }
        .slide-quiz-option:hover { border-color: #3b82f6; background: #0f172a; }
        .slide-quiz-option.selected { border-color: #3b82f6; background: #1e3a5f; }
        .slide-quiz-option.correct { border-color: #16a34a; background: rgba(22,163,74,0.15); color: #4ade80; }
        .slide-quiz-option.incorrect { border-color: #dc2626; background: rgba(220,38,38,0.1); color: #f87171; }
        .slide-quiz-feedback {
            display: none; margin-top: 0.75rem; padding: 0.75rem 1rem;
            border-radius: 0.5rem; font-size: 0.8125rem; font-weight: 500;
        }
        .slide-quiz-feedback.show { display: block; }
        .slide-quiz-feedback.correct { background: rgba(22,163,74,0.15); color: #4ade80; border: 1px solid rgba(22,163,74,0.3); }
        .slide-quiz-feedback.incorrect { background: rgba(220,38,38,0.1); color: #f87171; border: 1px solid rgba(220,38,38,0.2); }

        /* Media */
        .slide-image { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1rem 0; }
        .slide-audio { margin: 1rem 0; }
        .slide-audio audio { width: 100%; max-width: 500px; height: 40px; }
        .slide-video { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 1rem 0; border-radius: 0.5rem; }
        .slide-video iframe, .slide-video video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Bottom bar */
        .bottom-bar {
            border-top: 1px solid #1e293b;
            padding: 0.75rem 1.25rem;
            display: flex; flex-direction: column; gap: 0.5rem;
            background: #0d1117;
            flex-shrink: 0;
        }
        .progress-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; color: #64748b; }
        .progress-track { height: 4px; background: #1e293b; border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; background: #3b82f6; border-radius: 99px; transition: width 0.3s; }
        .dots { display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .dot {
            width: 8px; height: 8px; border-radius: 99px;
            background: #1e293b; cursor: pointer; transition: all 0.2s; border: none; padding: 0;
        }
        .dot.active { width: 20px; background: #3b82f6; }
        .dot.visited { background: rgba(59,130,246,0.35); }
        .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500;
            border: 1px solid #1e293b; background: transparent; color: #e2e8f0;
            cursor: pointer; transition: all 0.15s;
        }
        .nav-btn:hover { background: #1e293b; }
        .nav-btn:disabled { opacity: 0.35; cursor: default; }
        .nav-btn.primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        .nav-btn.primary:hover { background: #2563eb; }
        .nav-btn.complete { background: #16a34a; border-color: #16a34a; color: #fff; }
        .nav-btn.complete:hover { background: #15803d; }

        /* State selector */
        .state-picker { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 1.5rem; }
        .state-picker h2 { font-size: 1.25rem; font-weight: 700; color: #f1f5f9; margin-bottom: 0.25rem; }
        .state-picker p { font-size: 0.8125rem; color: #94a3b8; margin-bottom: 1.25rem; text-align: center; }
        .state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; max-height: 60vh; overflow-y: auto; width: 100%; max-width: 700px; padding: 0.25rem; }
        .state-btn {
            padding: 0.6rem 0.5rem; background: #111827; border: 1px solid #1e293b; border-radius: 0.5rem;
            color: #cbd5e1; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .state-btn:hover { border-color: #3b82f6; background: #0f172a; color: #f1f5f9; }
    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Loading slides…</p>
    </div>
    <div id="error" class="error" style="display:none;">
        <p>⚠ Could not load module slides.</p>
    </div>
    <div id="statePicker" class="state-picker" style="display:none;">
        <h2>Select Your State</h2>
        <p>This module covers state-specific use of force laws.<br>Choose your state to continue.</p>
        <div class="state-grid" id="stateGrid"></div>
    </div>
    <div id="viewer" style="display:none; flex:1; display:flex; flex-direction:column; height:100%;">
        <div class="slide-wrapper" id="slideArea"></div>
        <div class="bottom-bar">
            <div class="progress-row">
                <span id="slideLabel">Slide 1 of 1</span>
                <span id="pctLabel">0%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <div class="dots" id="dots"></div>
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" disabled>← Previous</button>
                <button class="nav-btn primary" id="nextBtn">Next →</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (async function() {
        const SUPABASE_URL = 'https://vaagvairvwmgyzsmymhs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_IPcFlKw8LEGnk2NYg5qrsw_Rq8yIhR1';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const params = new URLSearchParams(window.location.search);
        const moduleId = params.get('module_id');
        if (!moduleId) { showError(); return; }

        let slides = [];
        let current = 0;

        // ─── Determine module_code ───
        let moduleCode = '';
        try {
            const { data: modRow } = await client
                .from('training_modules')
                .select('module_code')
                .eq('id', moduleId)
                .maybeSingle();
            if (modRow) moduleCode = modRow.module_code;
        } catch (_) {}

        const STATE_MODULES = ['use-of-force'];

        // ─── State-specific module: show picker first ───
        if (STATE_MODULES.includes(moduleCode)) {
            try {
                const { data: states, error: stErr } = await client
                    .from('state_laws')
                    .select('*')
                    .order('state_name');
                if (stErr) throw stErr;

                document.getElementById('loader').style.display = 'none';
                const picker = document.getElementById('statePicker');
                picker.style.display = 'flex';
                const grid = document.getElementById('stateGrid');

                states.forEach(st => {
                    const btn = document.createElement('button');
                    btn.className = 'state-btn';
                    btn.textContent = st.state_name;
                    btn.onclick = () => {
                        picker.style.display = 'none';
                        slides = generateUseOfForceSlides(st);
                        bootViewer();
                    };
                    grid.appendChild(btn);
                });
            } catch (e) {
                console.error('State load error:', e);
                showError();
            }
            return; // wait for user click
        }

        // ─── Normal module: load slides from DB ───
        try {
            const { data, error } = await client
                .from('module_slides')
                .select('*')
                .eq('module_id', moduleId)
                .order('slide_number');
            if (error) throw error;
            if (!data || data.length === 0) { showError(); return; }
            slides = data;
        } catch (e) {
            console.error('Load error:', e);
            showError();
            return;
        }

        bootViewer();

        // ─── Boot viewer (shared between state-generated and DB slides) ───
        function bootViewer() {
            document.getElementById('loader').style.display = 'none';
            const viewer = document.getElementById('viewer');
            viewer.style.display = 'flex';

            // Build dots
            const dotsEl = document.getElementById('dots');
            dotsEl.innerHTML = '';
            if (slides.length <= 30) {
                slides.forEach((_, i) => {
                    const d = document.createElement('button');
                    d.className = 'dot' + (i === 0 ? ' active' : '');
                    d.onclick = () => goTo(i);
                    dotsEl.appendChild(d);
                });
            }

            renderSlide();

            // Nav buttons
            document.getElementById('prevBtn').onclick = () => goTo(current - 1);
            document.getElementById('nextBtn').onclick = () => {
                if (current === slides.length - 1) {
                    postMsg({ type: 'complete' });
                } else {
                    goTo(current + 1);
                }
            };

            // Keyboard nav
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && current > 0) goTo(current - 1);
                if (e.key === 'ArrowRight' && current < slides.length - 1) goTo(current + 1);
            });
        }

        function goTo(idx) {
            if (idx < 0 || idx >= slides.length) return;
            // Stop current audio
            document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
            current = idx;
            renderSlide();
        }

        function renderSlide() {
            const slide = slides[current];
            const area = document.getElementById('slideArea');
            let html = '';

            // Title
            if (slide.title) {
                html += `<div class="slide-title">${escHtml(slide.title)}</div>`;
            }

            // Image
            if (slide.image_url) {
                html += `<img class="slide-image" src="${escAttr(slide.image_url)}" alt="${escAttr(slide.title || 'Slide image')}">`;
            }

            // Content
            if (slide.content) {
                html += `<div class="slide-body">${slide.content}</div>`;
            }

            // Video
            if (slide.video_url) {
                const ytMatch = slide.video_url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
                if (ytMatch) {
                    html += `<div class="slide-video"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
                } else {
                    html += `<div class="slide-video"><video controls><source src="${escAttr(slide.video_url)}" type="video/mp4"></video></div>`;
                }
            }

            // Audio
            if (slide.audio_url) {
                html += `<div class="slide-audio"><audio id="slideAudio" controls><source src="${escAttr(slide.audio_url)}" type="audio/mpeg"><source src="${escAttr(slide.audio_url)}" type="audio/wav"></audio></div>`;
            }

            area.innerHTML = html;
            area.scrollTop = 0;

            // Autoplay audio
            if (slide.audio_url) {
                const audioEl = document.getElementById('slideAudio');
                if (audioEl) {
                    setTimeout(() => {
                        audioEl.play().catch(() => { /* browser blocked */ });
                    }, 150);
                }
            }

            // Update UI
            const pct = Math.round(((current + 1) / slides.length) * 100);
            document.getElementById('slideLabel').textContent = `Slide ${current + 1} of ${slides.length}`;
            document.getElementById('pctLabel').textContent = `${pct}%`;
            document.getElementById('progressFill').style.width = `${pct}%`;
            document.getElementById('prevBtn').disabled = current === 0;

            const nextBtn = document.getElementById('nextBtn');
            if (current === slides.length - 1) {
                nextBtn.textContent = '✓ Complete Module';
                nextBtn.className = 'nav-btn complete';
            } else {
                nextBtn.textContent = 'Next →';
                nextBtn.className = 'nav-btn primary';
            }

            // Update dots
            dotsEl.querySelectorAll('.dot').forEach((d, i) => {
                d.className = 'dot' + (i === current ? ' active' : i < current ? ' visited' : '');
            });

            // Initialize quizzes
            initQuizzes();

            // Notify parent
            postMsg({ type: 'progress', slide: current, total: slides.length, pct });
        }

        function initQuizzes() {
            const quizzes = document.querySelectorAll('.slide-quiz');
            console.log('[embed-viewer v2] initQuizzes: found', quizzes.length, 'quiz containers');
            quizzes.forEach(quiz => {
                const options = quiz.querySelectorAll('.slide-quiz-option');
                const feedback = quiz.querySelector('.slide-quiz-feedback');
                console.log('[embed-viewer v2] quiz options:', options.length);
                let answered = false;

                // Apply inline styles to each option (belt-and-suspenders — doesn't rely on CSS)
                options.forEach(option => {
                    Object.assign(option.style, {
                        padding: '0.75rem 1rem',
                        border: '1px solid #1e293b',
                        borderRadius: '0.5rem',
                        cursor: 'pointer',
                        fontSize: '0.875rem',
                        background: '#111827',
                        color: '#cbd5e1',
                        transition: 'all 0.15s',
                        marginBottom: '0.5rem',
                        display: 'block'
                    });
                    option.onmouseenter = () => {
                        if (!answered) { option.style.borderColor = '#3b82f6'; option.style.background = '#0f172a'; }
                    };
                    option.onmouseleave = () => {
                        if (!answered && !option.classList.contains('selected')) {
                            option.style.borderColor = '#1e293b'; option.style.background = '#111827';
                        }
                    };
                    option.onclick = () => {
                        if (answered) return;
                        answered = true;
                        // Reset all options
                        options.forEach(o => {
                            o.style.borderColor = '#1e293b'; o.style.background = '#111827'; o.style.color = '#cbd5e1';
                        });
                        const isCorrect = option.getAttribute('data-correct') === 'true';
                        if (isCorrect) {
                            option.style.borderColor = '#16a34a';
                            option.style.background = 'rgba(22,163,74,0.15)';
                            option.style.color = '#4ade80';
                            if (feedback) {
                                feedback.style.display = 'block';
                                feedback.style.marginTop = '0.75rem';
                                feedback.style.padding = '0.75rem 1rem';
                                feedback.style.borderRadius = '0.5rem';
                                feedback.style.fontSize = '0.8125rem';
                                feedback.style.fontWeight = '500';
                                feedback.style.background = 'rgba(22,163,74,0.15)';
                                feedback.style.color = '#4ade80';
                                feedback.style.border = '1px solid rgba(22,163,74,0.3)';
                                feedback.innerHTML = '<strong>✓ Correct!</strong> Great job!';
                            }
                        } else {
                            option.style.borderColor = '#dc2626';
                            option.style.background = 'rgba(220,38,38,0.1)';
                            option.style.color = '#f87171';
                            const correctOpt = quiz.querySelector('[data-correct="true"]');
                            if (correctOpt) {
                                correctOpt.style.borderColor = '#16a34a';
                                correctOpt.style.background = 'rgba(22,163,74,0.15)';
                                correctOpt.style.color = '#4ade80';
                            }
                            if (feedback) {
                                feedback.style.display = 'block';
                                feedback.style.marginTop = '0.75rem';
                                feedback.style.padding = '0.75rem 1rem';
                                feedback.style.borderRadius = '0.5rem';
                                feedback.style.fontSize = '0.8125rem';
                                feedback.style.fontWeight = '500';
                                feedback.style.background = 'rgba(220,38,38,0.1)';
                                feedback.style.color = '#f87171';
                                feedback.style.border = '1px solid rgba(220,38,38,0.2)';
                                feedback.innerHTML = '<strong>✗ Incorrect.</strong> The correct answer is highlighted above.';
                            }
                        }
                    };
                });

                // Hide feedback initially
                if (feedback) { feedback.style.display = 'none'; }
            });
        }

        function generateUseOfForceSlides(st) {
            const n = st.state_name;
            const esc = s => s || 'Information not available';
            return [
                { title: 'Legal Aspects & Use of Force', content: '<h3>Legal Aspects &amp; Use of Force</h3><p class="hero-subtitle">' + escHtml(n) + ' State Compliance</p><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">Module Overview</h4><p>Every action as a security guard must comply with ' + escHtml(n) + ' state law. What you don\'t know CAN land you in court.</p><p><strong>Duration:</strong> 1.5 Hours | <strong>Slides:</strong> 15</p></div>' },
                { title: 'Module Objectives', content: '<h3>What You\'ll Learn</h3><ul><li><strong>Understand ' + escHtml(n) + ' law governing security officers</strong></li><li><strong>Define use of force and legal limits</strong></li><li><strong>Recognize civil liability and legal responsibilities</strong></li><li><strong>Learn proper documentation and reporting practices</strong></li></ul><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">Key Message</h4><p><strong>"Know the rules, avoid the courtroom."</strong></p></div>' },
                { title: escHtml(n) + ' Security Guard Laws', content: '<h3>' + escHtml(n) + ' Law Governing Security Guards</h3><h4>Licensing Requirements:</h4><p><strong>' + escHtml(esc(st.licensing)) + '</strong></p><h4>Training Requirements:</h4><p><strong>' + escHtml(esc(st.training_hours)) + '</strong></p><h4>Minimum Age:</h4><p><strong>' + escHtml(esc(st.min_age)) + '</strong></p><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">Regulatory Agency</h4><p><strong>' + escHtml(esc(st.regulatory_agency)) + '</strong></p></div>' + (st.notes ? '<div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">Important Notes</h4><p>' + escHtml(st.notes) + '</p></div>' : '') },
                { title: 'Use of Force - State Law', content: '<h3>' + escHtml(n) + ' Use of Force Laws</h3><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">State-Specific Rules</h4><p><strong>' + escHtml(esc(st.use_of_force)) + '</strong></p></div><h4>Key Principles:</h4><ul><li><strong>Proportionate:</strong> Force must match the threat level</li><li><strong>Necessary:</strong> Only when required for safety</li><li><strong>Reasonable:</strong> What would a reasonable person do?</li></ul><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><p><strong>"You are NOT police."</strong> You have the same legal authority as any private citizen in ' + escHtml(n) + '.</p></div>' },
                { title: "Citizen's Arrest Authority", content: '<h3>Citizen\'s Arrest in ' + escHtml(n) + '</h3><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">' + escHtml(n) + ' Law</h4><p><strong>' + escHtml(esc(st.citizens_arrest)) + '</strong></p></div><h4>When You CAN Make a Citizen\'s Arrest:</h4><ul><li>Felony committed in your presence</li><li>Breach of peace occurring in your presence</li><li>You have reasonable belief a felony was committed</li></ul><h4>What You MUST Do:</h4><ul><li><strong>Immediately</strong> notify law enforcement</li><li><strong>Use minimum force</strong> necessary</li><li><strong>Document everything</strong> that occurred</li></ul>' },
                { title: 'Weapons and Armed Security', content: '<h3>' + escHtml(n) + ' Weapons Laws for Security</h3><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">' + escHtml(n) + ' Requirements</h4><p><strong>' + escHtml(esc(st.weapons)) + '</strong></p></div><h4>For Unarmed Security Guards:</h4><ul><li><strong>NO firearms</strong> unless specially licensed</li><li><strong>NO batons or impact weapons</strong> without certification</li><li><strong>NO chemical sprays</strong> (varies by employer policy)</li></ul>' },
                { title: 'Use of Force Continuum', content: '<h3>Use of Force Continuum</h3><h4>Authorized Levels for Unarmed Security:</h4><ul><li><strong>Presence:</strong> Uniformed, professional appearance</li><li><strong>Verbal:</strong> Commands, directions, de-escalation</li><li><strong>Passive Control:</strong> Guiding, escorting without resistance</li><li><strong>Escort Techniques:</strong> Minimal contact, cooperative movement</li></ul><h4>NOT Authorized:</h4><ul><li><strong>NO weapons</strong> (unless specially licensed)</li><li><strong>NO strikes or punches</strong></li><li><strong>NO chokeholds or restraints</strong></li><li><strong>NO pursuit beyond property</strong></li></ul>' },
                { title: 'Self-Defense and Defense of Others', content: '<h3>When Can You Use Force?</h3><h4>Self-Defense (' + escHtml(n) + ' Law):</h4><ul><li><strong>Imminent threat</strong> to yourself or others</li><li><strong>Reasonable belief</strong> force is necessary</li><li><strong>Proportionate response</strong> to the threat</li></ul><h4>Defense of Property:</h4><ul><li><strong>Limited authority</strong> — you\'re protecting the client\'s property</li><li><strong>Observe and report</strong> is usually the best approach</li><li><strong>Force only if</strong> there\'s immediate danger to people</li></ul>' },
                { title: 'Civil Liability and Lawsuits', content: '<h3>Understanding Civil Liability</h3><h4>You Can Be Sued For:</h4><ul><li><strong>Excessive force</strong> or assault</li><li><strong>False imprisonment</strong> (illegal detention)</li><li><strong>Negligence</strong> in performing duties</li><li><strong>Discrimination</strong> or civil rights violations</li></ul><h4>Protection Strategies:</h4><ul><li><strong>Follow policy</strong> and training exactly</li><li><strong>Document everything</strong> in detail</li><li><strong>Get witness statements</strong> when possible</li><li><strong>Report immediately</strong> to supervisors</li></ul>' },
                { title: 'Documentation and Reporting', content: '<h3>Critical Importance of Documentation</h3><h4>What to Document:</h4><ul><li><strong>Date, time, location</strong> of incident</li><li><strong>All parties involved</strong> (names, descriptions)</li><li><strong>Witnesses</strong> and their contact information</li><li><strong>Exact sequence of events</strong></li><li><strong>Your actions and why</strong> you took them</li><li><strong>Injuries or property damage</strong></li></ul><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><p><strong>"If it\'s not documented, it didn\'t happen."</strong></p></div>' },
                { title: 'Scenario: Shoplifter', content: '<h3>Real-World Scenario</h3><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><p>You observe someone concealing merchandise and heading for the exit. They see you and start running.</p></div><h4>What Should You Do?</h4><ol><li><strong>Observe and report</strong> — Get description</li><li><strong>Do NOT chase</strong> off property</li><li><strong>Call police</strong> immediately</li><li><strong>Preserve evidence</strong> (video footage)</li><li><strong>Document everything</strong></li></ol><h4>What NOT to Do:</h4><ul><li>❌ Chase into parking lot or street</li><li>❌ Physically tackle or restrain</li><li>❌ Assume you can make citizen\'s arrest</li></ul>' },
                { title: 'Scenario: Aggressive Individual', content: '<h3>Real-World Scenario</h3><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><p>An intoxicated person becomes verbally aggressive and starts moving toward you with clenched fists.</p></div><h4>Proper Response:</h4><ol><li><strong>Create distance</strong> — Step back</li><li><strong>Use verbal de-escalation</strong> — Calm voice</li><li><strong>Call for backup</strong> — Radio/phone</li><li><strong>Position yourself</strong> — Near exit, hands visible</li><li><strong>Retreat if possible</strong> — Safety first</li></ol><h4>If Physical Contact Occurs:</h4><ul><li><strong>Defend yourself</strong> with minimum necessary force</li><li><strong>Disengage</strong> as soon as safe</li><li><strong>Call police</strong> immediately</li><li><strong>Document</strong> injuries and witnesses</li></ul>' },
                { title: 'Professional Conduct Standards', content: '<h3>Maintaining Professional Standards</h3><h4>Always:</h4><ul><li><strong>Remain calm and professional</strong></li><li><strong>Treat everyone with respect</strong></li><li><strong>Follow company policies</strong></li><li><strong>Know your legal limits</strong></li><li><strong>Document thoroughly</strong></li></ul><h4>Never:</h4><ul><li>❌ Use excessive force</li><li>❌ Act outside your authority</li><li>❌ Discriminate or profile</li><li>❌ Pursue beyond property</li><li>❌ Fail to report incidents</li></ul>' },
                { title: escHtml(n) + ' Legal Resources', content: '<h3>Know Where to Get Help</h3><h4>Regulatory Agency:</h4><p><strong>' + escHtml(esc(st.regulatory_agency)) + '</strong></p><h4>When to Consult:</h4><ul><li><strong>Licensing questions</strong></li><li><strong>Scope of authority</strong> clarification</li><li><strong>Complaint procedures</strong></li><li><strong>Continuing education</strong> requirements</li></ul><h4>Additional Resources:</h4><ul><li><strong>Your employer\'s legal team</strong></li><li><strong>Professional security associations</strong></li><li><strong>State law enforcement agencies</strong></li></ul>' },
                { title: 'Module Summary', content: '<h3>Key Takeaways — ' + escHtml(n) + '</h3><div style="background:#111827;border:1px solid #1e293b;border-radius:0.5rem;padding:1rem;margin:0.75rem 0"><h4 style="margin:0 0 0.5rem">Remember These Critical Points:</h4><ul><li><strong>You are NOT police</strong> — Same authority as any citizen</li><li><strong>Force is last resort</strong> — De-escalation first</li><li><strong>Document everything</strong> — Protect yourself legally</li><li><strong>Know ' + escHtml(n) + ' law</strong> — Ignorance is not a defense</li><li><strong>Professional conduct always</strong> — Your reputation matters</li></ul></div><p style="text-align:center;margin-top:1.5rem;font-size:1.1rem;font-weight:600;color:#60a5fa;">"Know the rules, avoid the courtroom."</p>' }
            ];
        }

        function postMsg(data) {
            try { window.parent.postMessage({ source: 'embed-viewer', ...data }, '*'); } catch (_) {}
        }

        function showError() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
        }

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
    })();
    </script>
</body>
