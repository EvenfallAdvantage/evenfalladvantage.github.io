# ── Email + Roster Invitations ──
# Service-role-only; called from other Edge Functions, never from the client.
[functions.email-send]
enabled = true
verify_jwt = false
entrypoint = "./functions/email-send/index.ts"

# User-callable (admin/manager/owner). Generates Supabase Auth invite link
# and dispatches the invitation email via email-send.
[functions.roster-invite]
enabled = true
verify_jwt = true
entrypoint = "./functions/roster-invite/index.ts"

# User-callable (admin/manager/owner). Broadcast email + optional in-app
# notification fan-out to the whole roster (or a filtered subset).
[functions.roster-bulk-email]
enabled = true
verify_jwt = true
entrypoint = "./functions/roster-bulk-email/index.ts"

# User-callable (owner/admin only). Sends a real test message through the
# company's configured provider and stamps verified_at on success.
[functions.email-test-send]
enabled = true
verify_jwt = true
entrypoint = "./functions/email-test-send/index.ts"

# User-callable (owner/admin only). Writes SMTP password / Resend api_key to
# Supabase Vault and links it via integrations_config.vault_secret_id.
[functions.email-save-credentials]
enabled = true
verify_jwt = true
entrypoint = "./functions/email-save-credentials/index.ts"

# --- SMS (Phase 4 / HaloEngage) -------------------------------------
# Service-role-only generic SMS dispatcher. Called by other functions and the
# admin UI via wrapper functions; never user-facing.
[functions.sms-send]
enabled = true
verify_jwt = false
entrypoint = "./functions/sms-send/index.ts"

# User-callable (manager+ in submission's company). Replies to a public report
# submission's reporter_phone via the company's Twilio config.
[functions.sms-reply-to-reporter]
enabled = true
verify_jwt = true
entrypoint = "./functions/sms-reply-to-reporter/index.ts"

# User-callable (owner/admin only). Sends a test SMS and stamps verified_at.
[functions.sms-test-send]
enabled = true
verify_jwt = true
entrypoint = "./functions/sms-test-send/index.ts"

# User-callable (owner/admin only). Writes Twilio creds to Supabase Vault and
# links via integrations_config.vault_secret_id.
[functions.sms-save-credentials]
enabled = true
verify_jwt = true
entrypoint = "./functions/sms-save-credentials/index.ts"

# --- GDPR (Phase 6 / Enterprise compliance) --------------------------
# User-callable. Self-export always allowed; admin-export gated to owner role.
[functions.data-export]
enabled = true
verify_jwt = true
entrypoint = "./functions/data-export/index.ts"

# User-callable. Self-delete always allowed; admin-delete gated to owner.
# Requires confirm_email parameter that matches subject's email.
[functions.data-delete]
enabled = true
verify_jwt = true
entrypoint = "./functions/data-delete/index.ts"
