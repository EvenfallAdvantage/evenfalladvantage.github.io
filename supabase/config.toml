
[functions.send-welcome-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-welcome-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-welcome-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-welcome-email/*.html" ]

[functions.delete-student]
enabled = true
verify_jwt = true
import_map = "./functions/delete-student/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/delete-student/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/delete-student/*.html" ]

[functions.create-student]
enabled = true
verify_jwt = true
import_map = "./functions/create-student/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/create-student/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/create-student/*.html" ]

[functions.send-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-email/deno.json"
entrypoint = "./functions/send-email/index.ts"

[functions.create-checkout-session]
enabled = true
verify_jwt = true
import_map = "./functions/create-checkout-session/deno.json"
entrypoint = "./functions/create-checkout-session/index.ts"

[functions.process-course-payment]
enabled = true
verify_jwt = false
# Stripe webhooks cannot send JWTs; authentication is via webhook signature verification
import_map = "./functions/process-course-payment/deno.json"
entrypoint = "./functions/process-course-payment/index.ts"

[functions.webhook-checkr]
enabled = true
verify_jwt = false
# Checkr calls server-to-server; no JWT possible
import_map = "./functions/webhook-checkr/deno.json"
entrypoint = "./functions/webhook-checkr/index.ts"

[functions.webhook-fillout]
enabled = true
verify_jwt = false
# Fillout calls server-to-server; webhook secret verified in-function
import_map = "./functions/webhook-fillout/deno.json"
entrypoint = "./functions/webhook-fillout/index.ts"

[functions.opensky-proxy]
enabled = true
verify_jwt = false
# Public proxy — no JWT needed; CORS origin check + bounding box limits prevent abuse
entrypoint = "./functions/opensky-proxy/index.ts"

[functions.intake-ingest]
enabled = true
verify_jwt = false
# External company sites POST submissions with a Bearer API key (verified in-function).
# No JWT possible — third-party sites can't carry Supabase auth.
import_map = "./functions/intake-ingest/deno.json"
entrypoint = "./functions/intake-ingest/index.ts"
